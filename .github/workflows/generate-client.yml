name: Generate Client

on:
    pull_request:
        types:
            - opened
            - synchronize
        branches:
            - main
            - dev
        paths:
            - "backend/**"
            - ".github/workflows/generate-client.yml"

jobs:
    generate-client:
        if: github.actor != 'dependabot[bot]'
        permissions:
            contents: write
        runs-on: ubuntu-latest
        steps:
            # For PRs from forks
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            # For PRs from the same repo
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              if: ( github.event_name != 'pull_request' || github.secret_source == 'Actions' )
              with:
                  ref: ${{ github.head_ref }}
                  token: ${{ secrets.GITHUB_TOKEN }}
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: lts/*
            - name: Install pnpm
              run: npm install -g pnpm
            - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: "3.13"
            - name: Install uv
              uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
              with:
                  version: "0.4.15"
                  enable-cache: true
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
              working-directory: frontend
            - run: uv sync
              working-directory: backend
            - name: Create .env file
              run: cp .env.example .env
            - run: uv run bash scripts/generate-client.sh
              env:
                  VIRTUAL_ENV: backend/.venv
            - name: Add changes to git
              run: |
                  git config --local user.email "github-actions@github.com"
                  git config --local user.name "github-actions"
                  git add frontend/src/client
            # Same repo PRs
            - name: Push changes
              if: ( github.event_name != 'pull_request' || github.secret_source == 'Actions' )
              run: |
                  git diff --staged --quiet || git commit -m "✨ Autogenerate frontend client"
                  git push
            # Fork PRs
            - name: Check changes
              if: ( github.event_name == 'pull_request' && github.secret_source != 'Actions' )
              run: |
                  git diff --staged --quiet || (echo "Changes detected in generated client, run scripts/generate-client.sh and commit the changes" && exit 1)
