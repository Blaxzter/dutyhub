version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ⬆
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    groups:
      github-actions:
        update-types: [minor, major]

  # Python (backend)
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    commit-message:
      prefix: ⬆
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    groups:
      python-deps:
        update-types: [minor, major]

  # npm (frontend)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    commit-message:
      prefix: ⬆
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    groups:
      npm-deps:
        update-types: [minor, major]

  # Docker (backend)
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    commit-message:
      prefix: ⬆
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]

  # Docker (frontend)
  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    commit-message:
      prefix: ⬆
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
